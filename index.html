<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluey: Jardín Seguro</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-top: #4FC3F7;
            --sky-bottom: #B3E5FC;
            --grass: #8BC34A;
        }

        body {
            font-family: 'Nunito', sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom) 60%, var(--grass));
            min-height: 100vh; overflow-x: hidden;
            user-select: none; text-align: center; color: #333;
        }

        h1 {
            font-family: 'Fredoka One', cursive; font-size: 3rem;
            color: #fff; text-shadow: 3px 3px 0 #0D47A1;
            margin: 20px 0 10px;
        }

        /* Botón Música */
        #music-btn {
            position: fixed; top: 20px; right: 20px;
            background: #fff; border: 3px solid #1565C0; border-radius: 50%;
            width: 50px; height: 50px; cursor: pointer; z-index: 999;
            font-size: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.2s;
        }
        #music-btn:hover { transform: scale(1.1); background: #E3F2FD; }
        #music-btn.playing { background: #BBDEFB; border-color: #FF7043; }

        /* Contenedor de Huevos */
        .egg-container {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 30px; padding: 20px; max-width: 600px; margin: 0 auto;
        }

        .egg-btn {
            background: rgba(255,255,255,0.95);
            border: 5px solid #333;
            border-radius: 20px; padding: 20px; width: 200px;
            cursor: pointer; transition: all 0.2s;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .egg-btn:hover:not(:disabled) { transform: translateY(-10px) scale(1.05); }
        .egg-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: scale(0.95); }

        .egg-icon { font-size: 4rem; display: block; margin-bottom: 10px; }
        .egg-name { font-family: 'Fredoka One'; font-size: 1.5rem; color: #333; }
        .egg-time { font-size: 1rem; color: #666; font-weight: bold; display: block; margin-top: 5px; }

        /* Colores de huevos */
        .egg-a { border-color: #42A5F5; background: #E3F2FD; }
        .egg-b { border-color: #FF7043; background: #FBE9E7; }

        /* Modal */
        #modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 100;
            justify-content: center; align-items: center; flex-direction: column;
            color: white;
        }
        #modal-overlay.active { display: flex; }
        .hatching-egg { font-size: 10rem; animation: shake 0.3s infinite; }
        .timer-text { font-family: 'Fredoka One'; font-size: 6rem; margin: 10px 0; text-shadow: 0 0 20px #fff; }
        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0); }
            25% { transform: translateX(-20px) rotate(-10deg); }
            75% { transform: translateX(20px) rotate(10deg); }
        }

        /* Jardín */
        .garden-area {
            position: relative; width: 95%; max-width: 800px; height: 450px;
            margin: 20px auto 40px; background: #66BB6A; /* Verde oscuro para contraste */
            border: 10px solid #5D4037; border-radius: 20px;
            overflow: hidden; /* CLAVE: Nada sale de aquí */
            box-shadow: inset 0 0 80px rgba(0,0,0,0.3);
        }
        
        /* Césped visual */
        .garden-bg {
            position: absolute; width: 100%; height: 100%;
            background-image: radial-gradient(#81C784 20%, transparent 20%), radial-gradient(#81C784 20%, transparent 20%);
            background-size: 30px 30px; background-position: 0 0, 15px 15px;
            opacity: 0.5; pointer-events: none;
        }

        /* PERSONAJES */
        .character {
            position: absolute;
            width: 80px; height: 80px;
            cursor: pointer; z-index: 10;
            transition: left 3s ease-in-out, top 3s ease-in-out;
            animation: float 1.5s ease-in-out infinite;
            
            /* Fondo Blanco para que se vean bien */
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            border: 3px solid white;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .character img {
            width: 70px; height: 70px;
            object-fit: contain;
            pointer-events: none;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        
        .character.spawning { animation: spawn 0.5s ease-out; }
        @keyframes spawn { from { transform: scale(0); } to { transform: scale(1); } }

        .character:hover {
            transform: scale(1.3); z-index: 20;
            filter: drop-shadow(0 0 10px gold);
            animation: none;
        }

        .character::after {
            content: attr(data-name); position: absolute; bottom: -25px;
            left: 50%; transform: translateX(-50%); background: white;
            padding: 3px 10px; border-radius: 10px; font-family: 'Fredoka One';
            font-size: 12px; white-space: nowrap; opacity: 0;
            transition: opacity 0.2s; border: 2px solid #333; color: #333;
        }
        .character:hover::after { opacity: 1; }
    </style>
</head>
<body>

    <button id="music-btn" onclick="toggleMusic()">🔇</button>

    <h1>Jardín Bluey</h1>
    <p>Elige un huevo (Imágenes 1-28 y 29-56)</p>

    <!-- Solo 2 Huevos -->
    <div class="egg-container">
        <button class="egg-btn egg-a" onclick="startHatching('set_a')">
            <span class="egg-icon">🥚</span>
            <span class="egg-name">Grupo A</span>
            <span class="egg-time">⏱ 5s</span>
        </button>
        
        <button class="egg-btn egg-b" onclick="startHatching('set_b')">
            <span class="egg-icon">🥚</span>
            <span class="egg-name">Grupo B</span>
            <span class="egg-time">⏱ 5s</span>
        </button>
    </div>

    <!-- Modal -->
    <div id="modal-overlay">
        <div class="hatching-egg">🥚</div>
        <div class="timer-text" id="countdown-display">0</div>
        <p>Abriendo...</p>
    </div>

    <!-- Jardín -->
    <div class="garden-area">
        <div class="garden-bg"></div>
        <div id="garden-container"></div>
    </div>

    <script>
        // --- CONFIGURACIÓN SIMPLE ---
        // Huevo A: Imágenes de la 1 a la 28
        // Huevo B: Imágenes de la 29 a la 56
        
        let isHatching = false;

        // --- AUDIO (Sin cambios) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let isPlaying = false;

        function toggleMusic() {
            const btn = document.getElementById('music-btn');
            if(isPlaying) {
                isPlaying = false; btn.innerText = '🔇'; btn.classList.remove('playing');
            } else {
                if(!audioCtx) audioCtx = new AudioContext();
                isPlaying = true; btn.innerText = '🔊'; btn.classList.add('playing');
                playMelody();
            }
        }

        function playMelody() {
            if(!isPlaying || !audioCtx) return;
            const now = audioCtx.currentTime;
            const notes = [523, 587, 659, 698, 784, 698, 659, 587]; 
            notes.forEach((f, i) => {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = 'triangle'; osc.frequency.value = f;
                g.gain.setValueAtTime(0.1, now + i*0.25);
                g.gain.linearRampToValueAtTime(0, now + i*0.25 + 0.2);
                osc.connect(g); g.connect(audioCtx.destination);
                osc.start(now + i*0.25); osc.stop(now + i*0.25 + 0.25);
            });
            setTimeout(playMelody, notes.length * 250 + 500);
        }

        // --- LÓGICA DE JUEGO ---

        function startHatching(type) {
            if(isHatching) return;
            isHatching = true;
            
            document.querySelectorAll('.egg-btn').forEach(b => b.disabled = true);

            const overlay = document.getElementById('modal-overlay');
            const timer = document.getElementById('countdown-display');
            overlay.classList.add('active');

            let t = 5; // Tiempo reducido a 5 segundos
            timer.innerText = t;

            const interval = setInterval(() => {
                t--;
                timer.innerText = t;
                if(t <= 0) {
                    clearInterval(interval);
                    hatchCharacter(type);
                }
            }, 1000);
        }

        function hatchCharacter(type) {
            let num;
            // Asignar rango de números según el huevo
            if (type === 'set_a') {
                num = Math.floor(Math.random() * 28) + 1; // Números 1 al 28
            } else {
                num = Math.floor(Math.random() * 28) + 29; // Números 29 al 56
            }
            
            const charData = {
                name: 'Personaje ' + num,
                url: num + '.png', // Ej: 5.png, 40.png
                size: 'kid'
            };

            document.getElementById('modal-overlay').classList.remove('active');
            addToGarden(charData);

            document.querySelectorAll('.egg-btn').forEach(b => b.disabled = false);
            isHatching = false;
        }

        function addToGarden(charData) {
            const container = document.getElementById('garden-container');
            
            const charDiv = document.createElement('div');
            charDiv.className = 'character spawning';
            charDiv.setAttribute('data-name', charData.name);
            
            const img = document.createElement('img');
            img.src = charData.url;
            
            // Manejo de error: si la imagen no carga, la reintentamos con otra número
            img.onerror = function() {
                console.log("No encontré: " + charData.url);
                this.src = "1.png"; // Si falla, ponemos la 1.png que sabemos que funciona
                charDiv.setAttribute('data-name', 'Bandit (Backup)');
            };

            charDiv.appendChild(img);

            // Tamaños fijos para cálculo
            const charSize = 80; // Ancho y alto del personaje
            
            // Obtener tamaño REAL del jardín
            const rect = container.getBoundingClientRect();
            const maxX = rect.width - charSize;
            const maxY = rect.height - charSize;

            // Posición aleatoria DENTRO de los límites
            const startX = Math.max(0, Math.floor(Math.random() * maxX));
            const startY = Math.max(0, Math.floor(Math.random() * maxY));

            charDiv.style.left = startX + 'px';
            charDiv.style.top = startY + 'px';

            container.appendChild(charDiv);

            setTimeout(() => {
                charDiv.classList.remove('spawning');
                moveCharacter(charDiv, charSize);
            }, 500);
        }

        function moveCharacter(el, size) {
            if(!el.parentNode) return;

            const container = document.getElementById('garden-container');
            const rect = container.getBoundingClientRect();
            
            // Límites estrictos
            const maxX = rect.width - size;
            const maxY = rect.height - size;

            // Nueva posición aleatoria
            const newX = Math.max(0, Math.floor(Math.random() * maxX));
            const newY = Math.max(0, Math.floor(Math.random() * maxY));

            // Lógica de giro
            const currentX = parseFloat(el.style.left);
            if(newX > currentX) el.style.transform = 'scaleX(1)';
            else el.style.transform = 'scaleX(-1)';

            el.style.left = newX + 'px';
            el.style.top = newY + 'px';

            // Repetir movimiento
            setTimeout(() => moveCharacter(el, size), 3000 + Math.random()*2000);
        }
    </script>
</body>
</html>
