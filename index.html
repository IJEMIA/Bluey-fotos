<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba Bluey</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #81C784; padding: 20px; }
        button { padding: 20px; font-size: 20px; cursor: pointer; background: #FFD700; border: none; border-radius: 10px; }
        #garden { position: relative; width: 100%; height: 400px; background: white; margin-top: 20px; border: 2px dashed #333; }
        img { width: 100px; position: absolute; }
    </style>
</head>
<body>

    <h1>Prueba de Imagen 1.png</h1>
    <p>Si das clic y no sale la imagen, revisa la consola (F12).</p>
    
    <button onclick="ponerImagen()">Poner Imagen 1.png</button>
    
    <div id="garden"></div>

    <script>
        function ponerImagen() {
            const div = document.getElementById('garden');
            div.innerHTML = ''; // Limpiar
            
            const img = document.createElement('img');
            
            // RUTA DE PRUEBA
            img.src = '1.png'; 
            
            // Depuración: Esto nos dirá qué pasa
            img.onload = function() {
                alert("¡ÉXITO! La imagen cargó correctamente. El problema eran los nombres anteriores.");
            };
            img.onerror = function() {
                alert("ERROR: No se encontró '1.png'. Asegúrate de que el archivo se llame EXACTAMENTE '1.png' (en minúsculas, sin espacios) y esté en la carpeta principal.");
            };

            img.style.top = "50px";
            img.style.left = "50px";
            
            div.appendChild(img);
        }
    </script>
</body>
</html>
