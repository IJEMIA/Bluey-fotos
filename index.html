<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluey: Jardín y Confeti</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        :root {
            --sky-top: #4FC3F7;
            --sky-bottom: #B3E5FC;
            --grass: #8BC34A;
        }

        body {
            font-family: 'Nunito', sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom) 60%, var(--grass));
            min-height: 100vh; overflow-x: hidden;
            user-select: none; text-align: center; color: #333;
        }

        h1 {
            font-family: 'Fredoka One', cursive; font-size: 3rem;
            color: #fff; text-shadow: 3px 3px 0 #0D47A1;
            margin: 20px 0 10px;
        }

        /* Música */
        #music-btn {
            position: fixed; top: 20px; right: 20px;
            background: #fff; border: 3px solid #1565C0; border-radius: 50%;
            width: 50px; height: 50px; cursor: pointer; z-index: 999;
            font-size: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.2s;
        }
        #music-btn:hover { transform: scale(1.1); background: #E3F2FD; }
        #music-btn.playing { background: #BBDEFB; border-color: #FF7043; }

        /* Huevos */
        .egg-container {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 20px; padding: 20px; max-width: 800px; margin: 0 auto;
        }

        .egg-btn {
            background: rgba(255,255,255,0.95);
            border: 5px solid #333;
            border-radius: 20px; padding: 15px; width: 180px;
            cursor: pointer; transition: all 0.2s;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }
        .egg-btn:hover:not(:disabled) { transform: translateY(-10px) scale(1.05); }
        .egg-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: scale(0.95); }

        .egg-icon { font-size: 3rem; display: block; margin-bottom: 5px; }
        .egg-name { font-family: 'Fredoka One'; font-size: 1.3rem; color: #333; }
        .egg-time { font-size: 0.9rem; color: #666; font-weight: bold; display: block; margin-top: 5px; }

        .egg-a { border-color: #42A5F5; background: #E3F2FD; }
        .egg-b { border-color: #FF7043; background: #FBE9E7; }

        /* Botón Confeti */
        .confeti-btn {
            background: linear-gradient(45deg, #FF4081, #FF80AB);
            color: white;
            border: 3px solid white;
            font-family: 'Fredoka One';
            font-size: 1.2rem;
        }
        .confeti-btn:hover { transform: translateY(-5px) rotate(2deg); }

        /* Modal */
        #modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 100;
            justify-content: center; align-items: center; flex-direction: column;
            color: white;
        }
        #modal-overlay.active { display: flex; }
        .hatching-egg { font-size: 10rem; animation: shake 0.3s infinite; }
        .timer-text { font-family: 'Fredoka One'; font-size: 6rem; margin: 10px 0; text-shadow: 0 0 20px #fff; }
        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0); }
            25% { transform: translateX(-20px) rotate(-10deg); }
            75% { transform: translateX(20px) rotate(10deg); }
        }

        /* JARDÍN */
        .garden-area {
            position: relative; width: 95%; max-width: 800px; height: 450px;
            margin: 20px auto 40px; 
            background: #66BB6A;
            border: 10px solid #5D4037; border-radius: 20px;
            overflow: hidden; 
            box-shadow: inset 0 0 50px rgba(0,0,0,0.2);
        }
        
        /* Césped */
        .garden-bg {
            position: absolute; width: 100%; height: 100%;
            background-image: radial-gradient(#81C784 20%, transparent 20%), radial-gradient(#81C784 20%, transparent 20%);
            background-size: 30px 30px; background-position: 0 0, 15px 15px;
            opacity: 0.5; pointer-events: none;
            z-index: 0; 
        }

        /* IMPORTANTE: Contenedor ocupa TODO el espacio verde */
        #garden-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* PERSONAJES */
        .character {
            position: absolute;
            width: 80px; height: 80px;
            cursor: pointer; z-index: 10; 
            transition: left 2.5s ease-in-out, top 2.5s ease-in-out; 
            animation: float 1.5s ease-in-out infinite;
            
            background: rgba(255, 255, 255, 0.85);
            border-radius: 50%;
            border: 3px solid white;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .character img {
            width: 70px; height: 70px;
            object-fit: contain;
            pointer-events: none;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        
        .character.spawning { animation: spawn 0.5s ease-out; }
        @keyframes spawn { from { transform: scale(0); } to { transform: scale(1); } }

        .character:hover {
            transform: scale(1.3); z-index: 20;
            filter: drop-shadow(0 0 10px gold);
            animation: none;
        }

        .character::after {
            content: attr(data-name); position: absolute; bottom: -25px;
            left: 50%; transform: translateX(-50%); background: white;
            padding: 3px 10px; border-radius: 10px; font-family: 'Fredoka One';
            font-size: 12px; white-space: nowrap; opacity: 0;
            transition: opacity 0.2s; border: 2px solid #333; color: #333;
        }
        .character:hover::after { opacity: 1; }

        /* CONFETI */
        .confetti-piece {
            position: fixed;
            width: 10px; height: 10px;
            background: #f00;
            top: -10px;
            z-index: 1000;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }
    </style>
</head>
<body>

    <button id="music-btn" onclick="toggleMusic()">🔇</button>

    <h1>Jardín Bluey</h1>
    <p>Personajes en toda el área</p>

    <div class="egg-container">
        <button class="egg-btn egg-a" onclick="startHatching('set_a')">
            <span class="egg-icon">🥚</span>
            <span class="egg-name">Grupo A</span>
            <span class="egg-time">⏱ 5s</span>
        </button>
        
        <button class="egg-btn egg-b" onclick="startHatching('set_b')">
            <span class="egg-icon">🥚</span>
            <span class="egg-name">Grupo B</span>
            <span class="egg-time">⏱ 5s</span>
        </button>

        <!-- NUEVO BOTÓN CONFETI -->
        <button class="egg-btn confeti-btn" onclick="throwConfetti()">
            <span class="egg-icon">🎉</span>
            <span class="egg-name">Fiesta!</span>
            <span class="egg-time">🎉 Confeti</span>
        </button>
    </div>

    <!-- Modal -->
    <div id="modal-overlay">
        <div class="hatching-egg">🥚</div>
        <div class="timer-text" id="countdown-display">0</div>
        <p>Abriendo...</p>
    </div>

    <!-- Jardín -->
    <div class="garden-area">
        <div class="garden-bg"></div>
        <div id="garden-container"></div>
    </div>

    <script>
        let isHatching = false;

        // --- AUDIO ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let isPlaying = false;

        function toggleMusic() {
            const btn = document.getElementById('music-btn');
            if(isPlaying) {
                isPlaying = false; btn.innerText = '🔇'; btn.classList.remove('playing');
            } else {
                if(!audioCtx) audioCtx = new AudioContext();
                isPlaying = true; btn.innerText = '🔊'; btn.classList.add('playing');
                playMelody();
            }
        }

        function playMelody() {
            if(!isPlaying || !audioCtx) return;
            const now = audioCtx.currentTime;
            const notes = [523, 587, 659, 698, 784, 698, 659, 587]; 
            notes.forEach((f, i) => {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = 'triangle'; osc.frequency.value = f;
                g.gain.setValueAtTime(0.1, now + i*0.25);
                g.gain.linearRampToValueAtTime(0, now + i*0.25 + 0.2);
                osc.connect(g); g.connect(audioCtx.destination);
                osc.start(now + i*0.25); osc.stop(now + i*0.25 + 0.25);
            });
            setTimeout(playMelody, notes.length * 250 + 500);
        }

        // --- LÓGICA DE JUEGO ---

        function startHatching(type) {
            if(isHatching) return;
            isHatching = true;
            
            document.querySelectorAll('.egg-btn').forEach(b => b.disabled = true);

            const overlay = document.getElementById('modal-overlay');
            const timer = document.getElementById('countdown-display');
            overlay.classList.add('active');

            let t = 5;
            timer.innerText = t;

            const interval = setInterval(() => {
                t--;
                timer.innerText = t;
                if(t <= 0) {
                    clearInterval(interval);
                    hatchCharacter(type);
                }
            }, 1000);
        }

        function hatchCharacter(type) {
            let num;
            if (type === 'set_a') {
                num = Math.floor(Math.random() * 28) + 1; 
            } else {
                num = Math.floor(Math.random() * 28) + 29; 
            }
            
            const charData = {
                name: 'Personaje ' + num,
                url: num + '.png'
            };

            document.getElementById('modal-overlay').classList.remove('active');
            addToGarden(charData);

            document.querySelectorAll('.egg-btn').forEach(b => b.disabled = false);
            isHatching = false;
        }

        function addToGarden(charData) {
            const container = document.getElementById('garden-container');
            
            const charDiv = document.createElement('div');
            charDiv.className = 'character spawning';
            charDiv.setAttribute('data-name', charData.name);
            
            const img = document.createElement('img');
            img.src = charData.url;
            img.onerror = function() {
                this.src = "1.png";
                charDiv.setAttribute('data-name', 'Backup');
            };

            charDiv.appendChild(img);

            const charSize = 80;
            
            // Medimos el contenedor que ahora sí tiene tamaño completo
            const areaWidth = container.clientWidth;
            const areaHeight = container.clientHeight;

            // Cálculo correcto para usar TODO el espacio
            const maxX = Math.max(0, areaWidth - charSize);
            const maxY = Math.max(0, areaHeight - charSize);

            // Posición aleatoria
            const startX = Math.floor(Math.random() * maxX);
            const startY = Math.floor(Math.random() * maxY);

            charDiv.style.left = startX + 'px';
            charDiv.style.top = startY + 'px';

            container.appendChild(charDiv);

            setTimeout(() => {
                charDiv.classList.remove('spawning');
                moveCharacter(charDiv, charSize);
            }, 500);
        }

        function moveCharacter(el, size) {
            if(!el.parentNode) return;

            const container = document.getElementById('garden-container');
            
            const areaWidth = container.clientWidth;
            const areaHeight = container.clientHeight;

            const maxX = Math.max(0, areaWidth - size);
            const maxY = Math.max(0, areaHeight - size);

            const newX = Math.floor(Math.random() * maxX);
            const newY = Math.floor(Math.random() * maxY);

            const currentX = parseFloat(el.style.left);
            if(newX > currentX) el.style.transform = 'scaleX(1)';
            else el.style.transform = 'scaleX(-1)';

            el.style.left = newX + 'px';
            el.style.top = newY + 'px';

            setTimeout(() => moveCharacter(el, size), 2000 + Math.random()*2000);
        }

        // --- FUNCIÓN CONFETI ---
        function throwConfetti() {
            const colors = ['#FF4081', '#FF80AB', '#42A5F5', '#FFD700', '#66BB6A', '#AB47BC'];
            const total = 100; // Cantidad de piezas

            for(let i=0; i<total; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti-piece';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.background = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animationDuration = (Math.random() * 2 + 2) + 's'; // Entre 2 y 4 segundos
                conf.style.transform = 'rotate(' + Math.random() * 360 + 'deg)';
                
                // Formas variadas
                if(Math.random() > 0.5) {
                    conf.style.borderRadius = '50%';
                } else {
                    conf.style.width = '8px';
                    conf.style.height = '15px';
                }

                document.body.appendChild(conf);

                // Eliminar después de la animación
                setTimeout(() => conf.remove(), 4000);
            }
        }
    </script>
</body>
</html>
